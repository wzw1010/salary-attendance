<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="考勤薪资">
    <meta name="theme-color" content="#FF5E3A" id="themeColorMeta">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <title>考勤·薪资预算</title>
    <style>
        :root {
            --bg-primary: #0A0A0C;
            --bg-card-solid: #1c1c1e;
            --bg-input: rgba(255, 255, 255, 0.08);
            --border-card: rgba(255, 255, 255, 0.08);
            --border-input: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-tertiary: rgba(255, 255, 255, 0.4);
            --color-hours: #34c759;
            --color-overtime: #5ac8fa;
            --color-salary: #F0B90B;
            --accent: #FF5E3A;
            --color-work: #68D4AA;
            --color-night: #8E8FFF;
            --color-rest: #AEAEB2;
            --color-holiday: #FFA040;
            --bg-work: rgba(104, 212, 170, 0.2);
            --bg-night: rgba(142, 143, 255, 0.2);
            --bg-rest: rgba(174, 174, 178, 0.2);
            --bg-holiday: rgba(255, 160, 64, 0.22);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-full: 50%;
            --space-xs: 6px;
            --space-sm: 10px;
            --space-md: 16px;
            --space-lg: 24px;
            --font-caption: 12px;
            --font-body: 16px;
            --font-title: 20px;
            --font-large: 34px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
            --header-height: 60px;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f2f2f7;
                --bg-card-solid: #ffffff;
                --bg-input: rgba(0, 0, 0, 0.06);
                --border-card: rgba(0, 0, 0, 0.08);
                --border-input: rgba(0, 0, 0, 0.12);
                --text-primary: #000000;
                --text-secondary: rgba(0, 0, 0, 0.55);
                --text-tertiary: rgba(0, 0, 0, 0.35);
                --accent: #FF5E3A;
                --color-work: #34A87A;
                --color-night: #6A6BDF;
                --color-rest: #8E8E93;
                --color-holiday: #F0882A;
                --bg-work: rgba(104, 212, 170, 0.18);
                --bg-night: rgba(142, 143, 255, 0.18);
                --bg-rest: rgba(174, 174, 178, 0.22);
                --bg-holiday: rgba(255, 160, 64, 0.25);
                --shadow: 0 2px 10px rgba(0,0,0,0.06);
            }
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { height:100%; }
        body {
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-top: calc(var(--header-height) + var(--safe-top) + 8px);
            padding-bottom: calc(12px + var(--safe-bottom));
            position: relative;
        }

        /* 线性渐变背景层：顶部最深，向下平滑过渡 */
        .gradient-bg {
            position: fixed; top:0; left:0; width:100%; height:100vh; z-index:0;
            pointer-events: none;
            /* 深色模式：顶部柔和橙红，向下逐步衰减至透明 */
            background: linear-gradient(
    to bottom,
    rgba(255,107,53,0.40) 0%,      /* 纯正橘色，较浓 */
    rgba(255,107,53,0.20) 25%,
    rgba(255,107,53,0.06) 50%,
    rgba(255,107,53,0.02) 75%,
    transparent 100%
);
        }
        @media (prefers-color-scheme: light) {
            .gradient-bg {
                background: linear-gradient(
    to bottom,
    rgba(255,107,53,0.35) 0%,
    rgba(255,107,53,0.18) 30%,
    rgba(255,107,53,0.08) 55%,
    rgba(255,107,53,0.03) 80%,
    transparent 100%
);
            }
        }

        .app { max-width:480px; margin:0 auto; padding:0 var(--space-md); position:relative; z-index:1; }

        .nav-header {
            position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; z-index:10;
            padding: calc(var(--safe-top) + 10px) var(--space-md) 12px;
            display:flex; align-items:center; gap:var(--space-sm);
            background: transparent;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            min-height: var(--header-height);
        }
        .header-title-group { display:flex; align-items:center; gap:8px; margin-right:auto; }
        .header-title { font-weight:700; font-size:var(--font-title); color:var(--text-primary); white-space: nowrap; }
        .month-indicator-circle {
            width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,0.12);
            display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600;
            color:var(--text-secondary); pointer-events:none;
        }
        .nav-actions { display:flex; align-items:center; gap:4px; }
        .month-arrow, .clear-btn {
            width:28px; height:28px; display:flex; align-items:center; justify-content:center;
            background:rgba(255,255,255,0.12); border-radius:50%; border:none; cursor:pointer;
            color:var(--text-secondary); transition:background 0.2s; font-size:13px;
        }
        .month-arrow:active, .clear-btn:active { background:rgba(255,255,255,0.2); }
        .clear-btn svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:1.8; }

        .scroll-content { padding-top:var(--space-sm); }

        .section {
            background: var(--bg-card-solid);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border:1px solid var(--border-card);
            border-radius:var(--radius-md);
            margin-bottom:16px; overflow:hidden;
            box-shadow:var(--shadow);
        }
        #salarySection { margin-bottom:33.3px; }

        .section-header {
            display:flex; align-items:center; gap:var(--space-sm);
            padding:var(--space-md); cursor:pointer;
        }
        .section-header:active { background:var(--bg-input); }
        .section-body { display:none; padding:0 var(--space-md) var(--space-md); }
        .section.expanded .section-body { display:block; }
        .section.expanded .section-header .chevron { transform:rotate(90deg); }
        .section.expanded .section-header { border-bottom:1px solid var(--border-card); }

        .stat-header {
            display:flex; align-items:center; gap:var(--space-sm);
            padding:var(--space-md); cursor:pointer;
        }
        .stat-left { display:flex; flex-direction:column; gap:2px; flex:1; }
        .stat-label { font-size:var(--font-caption); color:var(--text-secondary); font-weight:600; text-transform:uppercase; letter-spacing:0.3px; }
        .stat-value { font-size:var(--font-large); font-weight:700; color:var(--text-primary); line-height:1.1; }
        .stat-right { display:flex; align-items:center; gap:8px; }
        .stat-icon, .progress-ring { width:44px; height:44px; }
        .progress-ring circle { fill:none; stroke-width:5; stroke-linecap:round; }
        .ring-bg { stroke:rgba(128,128,128,0.15); }

        #workHoursSection .stat-value { color: var(--color-hours); }
        #workHoursSection .ring-fill { stroke: var(--color-hours); }
        #overtimePaySection .stat-value { color: var(--color-overtime); }
        #salarySection .stat-value { color: var(--color-salary); }

        .overtime-row {
            display:flex; justify-content:space-between; align-items:center;
            padding:10px 0; border-bottom:1px solid var(--border-card); font-size:var(--font-caption);
        }
        .overtime-row:last-child { border-bottom:none; }
        .overtime-label { color:var(--text-secondary); display:flex; align-items:center; gap:6px; }
        .overtime-label svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:1.5; }
        .overtime-value { font-weight:600; }

        .manual-row { display:flex; align-items:center; gap:8px; padding-top:8px; }
        .manual-row .input-field { height:36px; font-size:var(--font-body); }

        .detail-row {
            display:flex; align-items:center; justify-content:space-between;
            padding:10px 0; border-bottom:1px solid var(--border-card); font-size:var(--font-caption);
        }
        .detail-row:last-child { border-bottom:none; }
        .detail-label { color:var(--text-secondary); display:flex; align-items:center; gap:6px; }
        .detail-label svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:1.5; }
        .detail-value { font-weight:600; }

        .editable-full-hours {
            display: inline-flex; align-items: center; gap: 4px;
            color: var(--color-hours); cursor: pointer; text-decoration: underline;
            text-underline-offset: 2px;
        }
        .editable-full-hours input {
            background: transparent; border: none; outline: none;
            color: var(--color-hours); font-size: inherit; font-weight: inherit;
            font-family: inherit; width: 60px; text-align: center;
            -webkit-appearance: none; box-shadow: none;
            display: none;
        }
        .editable-full-hours.editing .display-text { display: none; }
        .editable-full-hours.editing input { display: inline-block; }
        .editable-full-hours .edit-icon { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

        .salary-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--space-sm); padding:var(--space-sm) 0; }
        .salary-item { background:var(--bg-input); border-radius:var(--radius-sm); padding:var(--space-sm); text-align:center; }
        .salary-item .item-label { font-size:var(--font-caption); color:var(--text-secondary); font-weight:500; }
        .salary-item .item-input {
            background:transparent; border:none; color:var(--text-primary);
            font-size:var(--font-body); font-weight:600; text-align:center;
            width:100%; outline:none; font-family:inherit;
        }

        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:var(--space-md); }
        .cal-day {
            aspect-ratio:1/1; background:var(--bg-card-solid); border-radius:var(--radius-sm);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            cursor:pointer; transition:transform 0.15s; border:1px solid transparent;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .cal-day:active { transform:scale(0.94); }
        .cal-day.empty { background:transparent; backdrop-filter:none; pointer-events:none; }
        .cal-day.work { background:var(--bg-work); border-color:rgba(104,212,170,0.25); }
        .cal-day.night { background:var(--bg-night); border-color:rgba(142,143,255,0.25); }
        .cal-day.rest { background:var(--bg-rest); border-color:rgba(174,174,178,0.25); }
        .cal-day.holiday { background:var(--bg-holiday); border-color:rgba(255,160,64,0.3); }
        .day-number { font-size:var(--font-body); font-weight:600; }
        .day-label { font-size:9px; font-weight:600; color:var(--text-secondary); margin-top:1px; }

        .modal-overlay {
            position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
            background:rgba(0,0,0,0.4); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            opacity:0; pointer-events:none; transition:opacity 0.3s;
        }
        .modal-overlay.show { opacity:1; pointer-events:auto; }
        .modal-content {
            width:85%; max-width:400px; background:var(--bg-card-solid);
            border-radius:var(--radius-lg); padding:var(--space-lg); box-shadow:var(--shadow);
            display:flex; flex-direction:column; gap:var(--space-md);
            transform:scale(0.9); transition:transform 0.35s; border:1px solid var(--border-card);
        }
        .modal-overlay.show .modal-content { transform:scale(1); }
        .modal-shift-selector { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-xs); }
        .shift-option-big {
            background:var(--bg-input); border:1px solid var(--border-input); border-radius:var(--radius-sm);
            padding:8px 6px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px;
            color:var(--text-secondary); transition:all 0.2s;
        }
        .shift-option-big svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.8; }
        .shift-option-big .shift-text { font-size:10px; font-weight:600; }
        .shift-option-big.active { background:var(--accent); color:#fff; border-color:var(--accent); }
        .modal-hours-row { display:flex; gap:8px; }
        .modal-hours-row .input-field { flex:1; }
        .btn-save {
            background:var(--accent); border:none; color:#fff; border-radius:var(--radius-sm);
            padding:12px; font-weight:700; font-size:var(--font-body); cursor:pointer;
        }

        .input-field {
            background:var(--bg-input); border:1px solid var(--border-input); border-radius:var(--radius-sm);
            padding:10px 12px; font-size:var(--font-body); font-weight:600; color:var(--text-primary);
            text-align:center; width:100%; font-family:inherit; outline:none;
            transition:border-color 0.2s; -webkit-appearance:none;
        }
        .input-field:focus { border-color: var(--accent); }

        .toast-msg {
            position:fixed; bottom:calc(20px + var(--safe-bottom)); left:50%; transform:translateX(-50%);
            background:var(--bg-card-solid); padding:10px 24px; border-radius:50px;
            font-size:var(--font-caption); z-index:200; opacity:0; transition:0.3s;
            box-shadow:var(--shadow); pointer-events:none;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .toast-msg.show { opacity:1; bottom:calc(30px + var(--safe-bottom)); }

        .calendar-section { transition:opacity 0.25s; }
        .calendar-section.hidden { opacity:0; pointer-events:none; }
    </style>
</head>
<body>
<div class="gradient-bg"></div>
<div class="app">
    <div class="nav-header">
        <div class="header-title-group">
            <span class="header-title">考勤·薪资预算</span>
            <span class="month-indicator-circle" id="monthIndicator"></span>
        </div>
        <div class="nav-actions">
            <button class="month-arrow" id="prevMonthBtn" aria-label="上个月">◀</button>
            <button class="month-arrow" id="nextMonthBtn" aria-label="下个月">▶</button>
            <button class="clear-btn" id="clearDataBtn" aria-label="清空当月数据">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </button>
        </div>
    </div>
    <div class="scroll-content" id="scrollContent">
        <div id="cardsWrapper"></div>
    </div>
</div>

<div class="modal-overlay" id="editModalOverlay">
    <div class="modal-content">
        <div class="modal-shift-selector" id="modalShiftSelector">
            <button class="shift-option-big" data-shift="work">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" stroke="currentColor" fill="none"/><line x1="12" y1="1" x2="12" y2="4" stroke="currentColor"/><line x1="4" y1="12" x2="1" y2="12" stroke="currentColor"/><line x1="20" y1="12" x2="23" y2="12" stroke="currentColor"/></svg>
                <span class="shift-text">白班</span>
            </button>
            <button class="shift-option-big" data-shift="night">
                <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" fill="none"/></svg>
                <span class="shift-text">夜班</span>
            </button>
            <button class="shift-option-big" data-shift="rest">
                <svg viewBox="0 0 24 24"><path d="M13 3h-2v6h2V3z" stroke="currentColor" fill="none"/><path d="M4 12h16" stroke="currentColor"/><path d="M6 12v6h12v-6" stroke="currentColor"/></svg>
                <span class="shift-text">休息</span>
            </button>
            <button class="shift-option-big" data-shift="holiday">
                <svg viewBox="0 0 24 24"><polygon points="12,2 15,8 22,9 17,14 18,21 12,17 6,21 7,14 2,9 9,8" stroke="currentColor" fill="none"/></svg>
                <span class="shift-text">法定</span>
            </button>
        </div>
        <div class="modal-hours-row">
            <input type="number" class="input-field" id="modalNormal" step="any" placeholder="正常工时" inputmode="decimal">
            <input type="number" class="input-field" id="modalOvertime" step="any" placeholder="加班工时" inputmode="decimal">
        </div>
        <button class="btn-save" id="modalSaveBtn">保存</button>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
(function(){
    const STORAGE_PREFIX = 'wh_v53_';
    const DEF_NORMAL = 8, DEF_OVERTIME = 4;
    const SALARY_STORAGE = 'sc_v44';
    const FULL_HOURS_KEY = 'fh_v35';

    let year, month, data = [];
    let selectedDay = null;
    let fullWorkHours = 160;
    let salaryConfig = {
        baseSalary:0, performance:0, otherDeduction:0, otherAllowance:0,
        insuranceDeduction:0, personalTax:0, manualOvertimePay:null,
        rentDeduction:0, mealFeeDeduction:0, highTempAllowance:0, seniorityAllowance:0,
        nightAllowanceManual:null
    };

    const $ = id => document.getElementById(id);
    const cardsWrapper = $('cardsWrapper');
    const toastEl = $('toastMsg');
    const modalOverlay = $('editModalOverlay');
    const themeMeta = $('themeColorMeta');

    function showToast(msg) {
        toastEl.textContent = msg; toastEl.classList.add('show');
        clearTimeout(toastEl._timeout);
        toastEl._timeout = setTimeout(() => toastEl.classList.remove('show'), 1800);
    }
    const getDays = (y,m) => new Date(y,m,0).getDate();
    const getFirstDay = (y,m) => new Date(y,m-1,1).getDay();
    const getKey = () => STORAGE_PREFIX + year + '_' + month;

    function loadData() {
        const raw = localStorage.getItem(getKey());
        const days = getDays(year, month);
        if(raw){ try{ const p=JSON.parse(raw); data=p.rows||[]; }catch(e){data=[];} }else data=[];
        data.forEach(d => { d.shift = d.shift || ''; d.normal = d.normal || 0; d.overtime = d.overtime || 0; });
        while(data.length < days) data.push({shift:'', normal:0, overtime:0});
        if(data.length > days) data.length = days;
    }
    function saveData(){ localStorage.setItem(getKey(), JSON.stringify({year,month,rows:data})); }
    function clearAllData(){
        data = Array(getDays(year, month)).fill(null).map(() => ({shift:'', normal:0, overtime:0}));
        saveData();
    }
    function loadSalaryConfig(){
        try{ const s = localStorage.getItem(SALARY_STORAGE); if(s) salaryConfig = JSON.parse(s); }catch(e){}
        salaryConfig = { baseSalary:0,performance:0,otherDeduction:0,otherAllowance:0,insuranceDeduction:0,personalTax:0,manualOvertimePay:null,rentDeduction:0,mealFeeDeduction:0,highTempAllowance:0,seniorityAllowance:0,nightAllowanceManual:null, ...salaryConfig };
    }
    function saveSalaryConfig(){ localStorage.setItem(SALARY_STORAGE, JSON.stringify(salaryConfig)); }
    function loadFullHours(){
        try{ const v = localStorage.getItem(FULL_HOURS_KEY); if(v !== null) fullWorkHours = parseInt(v); }catch(e){}
        if(isNaN(fullWorkHours) || fullWorkHours < 0) fullWorkHours = 160;
    }
    function saveFullHours(){ localStorage.setItem(FULL_HOURS_KEY, fullWorkHours.toString()); }

    function computeWorkStats(){
        let normalTotal = 0, overtimeTotal = 0, holidayTotal = 0;
        data.forEach(d => {
            const n = d.normal || 0, o = d.overtime || 0;
            normalTotal += n;
            if(d.shift === 'holiday') holidayTotal += o;
            else overtimeTotal += o;
        });
        return { total: normalTotal + overtimeTotal, normalTotal, overtimeTotal, holidayTotal };
    }

    function computeOvertimeSalary(){
        let nonHoliday=0, holidayOvt=0;
        data.forEach(d => {
            if(d.shift === 'holiday') { holidayOvt += (d.overtime||0); return; }
            nonHoliday += (d.normal||0) + (d.overtime||0);
        });
        const overtimeHrs = Math.max(0, nonHoliday - fullWorkHours);
        const rate = salaryConfig.baseSalary / 21.75 / 8;
        const normalPay = rate * 1.5 * overtimeHrs;
        const holidayPay = rate * 3 * holidayOvt;
        const autoPay = normalPay + holidayPay;
        return {
            overtimeHours: overtimeHrs, holidayOvertimeHours: holidayOvt,
            normalOvertimePay: normalPay, holidayOvertimePay: holidayPay,
            autoOvertimePay: autoPay,
            finalOvertimePay: salaryConfig.manualOvertimePay !== null ? salaryConfig.manualOvertimePay : autoPay,
            hourRate: rate
        };
    }

    function computeSalary(){
        const oRes = computeOvertimeSalary();
        const totalAllHours = data.reduce((sum, d) => sum + (d.normal||0) + (d.overtime||0), 0);
        const meal = totalAllHours * 1;
        const nightCount = data.filter(d => d.shift === 'night').length;
        const autoNight = nightCount * 30;
        const nightAllow = salaryConfig.nightAllowanceManual !== null ? salaryConfig.nightAllowanceManual : autoNight;
        const gross = salaryConfig.baseSalary + salaryConfig.performance + salaryConfig.otherAllowance
            + meal + oRes.finalOvertimePay + nightAllow
            + salaryConfig.highTempAllowance + salaryConfig.seniorityAllowance
            - salaryConfig.otherDeduction - salaryConfig.rentDeduction - salaryConfig.mealFeeDeduction;
        const net = gross - salaryConfig.insuranceDeduction - salaryConfig.personalTax;
        return { gross, net, meal, nightAllow, autoNight, overtimeRes: oRes };
    }

    function openModal(idx){
        selectedDay = idx;
        const row = data[idx] || { shift:'', normal:0, overtime:0 };
        document.querySelectorAll('#modalShiftSelector .shift-option-big').forEach(b => b.classList.toggle('active', b.dataset.shift === row.shift));
        $('modalNormal').value = row.normal;
        $('modalOvertime').value = row.overtime;
        modalOverlay.classList.add('show');
        setTimeout(() => $('modalOvertime').focus(), 400);
    }

    function closeModal(){
        modalOverlay.classList.remove('show');
        document.activeElement?.blur?.();
    }

    function saveModal(){
        if(selectedDay === null) return;
        data[selectedDay].normal = Math.min(24, Math.max(0, parseFloat($('modalNormal').value) || 0));
        data[selectedDay].overtime = Math.min(24, Math.max(0, parseFloat($('modalOvertime').value) || 0));
        saveData();
        closeModal();
        renderAll();
        showToast('工时已保存');
    }

    function setShiftFromModal(shift){
        if(selectedDay === null) return;
        const def = (shift==='work'||shift==='night') ? {normal:DEF_NORMAL, overtime:DEF_OVERTIME} : {normal:0, overtime:0};
        data[selectedDay].shift = shift;
        data[selectedDay].normal = def.normal;
        data[selectedDay].overtime = def.overtime;
        document.querySelectorAll('#modalShiftSelector .shift-option-big').forEach(b => b.classList.toggle('active', b.dataset.shift === shift));
        $('modalNormal').value = def.normal;
        $('modalOvertime').value = def.overtime;
        saveData();
        renderAll();
        showToast(`已设为${ {work:'白班',night:'夜班',rest:'休息',holiday:'法定'}[shift] }`);
    }

    function updateCalendarVisibility() {
        const expandedSections = document.querySelectorAll('.section.expanded');
        const calendarSection = document.getElementById('calendarArea');
        if (calendarSection) calendarSection.classList.toggle('hidden', expandedSections.length > 0);
    }

    function renderAll(){
        const daysInMonth = getDays(year, month);
        if (selectedDay === null || selectedDay < 0 || selectedDay >= daysInMonth) {
            const today = new Date();
            selectedDay = (today.getFullYear() === year && today.getMonth()+1 === month) ? today.getDate()-1 : 0;
        }
        const stats = computeWorkStats();
        const pct = fullWorkHours > 0 ? Math.min(100, (stats.total / fullWorkHours)*100) : 0;
        const circ = 2 * Math.PI * 18;
        const off = circ - (pct/100)*circ;

        const sal = computeSalary();
        const oRes = sal.overtimeRes;
        $('monthIndicator').textContent = month;

        cardsWrapper.innerHTML = `
            <div class="section" id="workHoursSection">
                <div class="stat-header" data-toggle="workHours">
                    <div class="stat-left">
                        <span class="stat-label">记薪工时</span>
                        <span class="stat-value">${stats.total.toFixed(1)}</span>
                        <span style="font-size:var(--font-caption); color:var(--text-tertiary);">满勤 ${fullWorkHours.toFixed(1)}</span>
                    </div>
                    <div class="stat-right">
                        <svg class="progress-ring" viewBox="0 0 44 44">
                            <circle class="ring-bg" cx="22" cy="22" r="18"/>
                            <circle class="ring-fill" cx="22" cy="22" r="18" stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 22 22)"/>
                        </svg>
                        <svg class="chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6" stroke="currentColor" fill="none"/></svg>
                    </div>
                </div>
                <div class="section-body">
                    <div class="detail-row">
                        <span class="detail-label">正常工时</span>
                        <span class="detail-value">${stats.normalTotal.toFixed(1)} h</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">加班工时</span>
                        <span class="detail-value">${stats.overtimeTotal.toFixed(1)} h</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">法定节假日工时</span>
                        <span class="detail-value">${stats.holidayTotal.toFixed(1)} h</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">满勤工时</span>
                        <span class="detail-value">
                            <span class="editable-full-hours" id="fullHoursWrapper">
                                <span class="display-text">${fullWorkHours.toFixed(1)} h</span>
                                <input type="number" step="any" inputmode="decimal" id="fullHoursInput">
                                <svg class="edit-icon" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                            </span>
                        </span>
                    </div>
                </div>
            </div>

            <div class="section" id="overtimePaySection">
                <div class="stat-header" data-toggle="overtimePay">
                    <div class="stat-left">
                        <span class="stat-label">加班薪资</span>
                        <span class="stat-value" id="overtimePayTotal">${oRes.finalOvertimePay.toFixed(1)}</span>
                        <span style="font-size:var(--font-caption); color:var(--text-tertiary);" id="overtimePaySub">
                            ${salaryConfig.manualOvertimePay !== null ? '手动 ' : ''}延时 ${oRes.normalOvertimePay.toFixed(1)} | 法定 ${oRes.holidayOvertimePay.toFixed(1)}
                        </span>
                    </div>
                    <div class="stat-right">
                        <svg class="stat-icon" viewBox="0 0 24 24" stroke="var(--color-overtime)" fill="none" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        <svg class="chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6" stroke="currentColor" fill="none"/></svg>
                    </div>
                </div>
                <div class="section-body">
                    <div class="overtime-row">
                        <span class="overtime-label">延时加班费</span>
                        <span class="overtime-value" id="normalOvertimePayValue">${oRes.normalOvertimePay.toFixed(1)}</span>
                    </div>
                    <div class="overtime-row">
                        <span class="overtime-label">法定节假日加班费</span>
                        <span class="overtime-value" id="holidayOvertimePayValue">${oRes.holidayOvertimePay.toFixed(1)}</span>
                    </div>
                    <div class="manual-row">
                        <span style="font-size:var(--font-caption); color:var(--text-secondary);">手动更正</span>
                        <input class="input-field" id="manualOvertime" value="${salaryConfig.manualOvertimePay??''}" placeholder="${oRes.autoOvertimePay.toFixed(1)}" step="any" inputmode="decimal" style="flex:1;">
                        <button id="resetOvertimeBtn" style="background:var(--bg-input); border:1px solid var(--border-input); padding:4px 10px; border-radius:var(--radius-sm); font-size:var(--font-caption); color:var(--text-primary);">重置</button>
                    </div>
                </div>
            </div>

            <div class="section" id="salarySection">
                <div class="stat-header" data-toggle="salary">
                    <div class="stat-left">
                        <span class="stat-label">实发薪资</span>
                        <span class="stat-value" id="netSalaryValue">${sal.net.toFixed(1)}</span>
                        <span style="font-size:var(--font-caption); color:var(--text-tertiary);">应发 ${sal.gross.toFixed(1)}</span>
                    </div>
                    <div class="stat-right">
                        <svg class="stat-icon" viewBox="0 0 24 24" stroke="var(--color-salary)" fill="none" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="3"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                        <svg class="chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6" stroke="currentColor" fill="none"/></svg>
                    </div>
                </div>
                <div class="section-body">
                    <div class="salary-grid">
                        <div class="salary-item"><span class="item-label">底薪</span><input class="item-input" id="baseSalary" value="${salaryConfig.baseSalary}" step="any" inputmode="decimal"></div>
                        <div class="salary-item"><span class="item-label">绩效</span><input class="item-input" id="performance" value="${salaryConfig.performance}" step="any" inputmode="decimal"></div>
                        <div class="salary-item"><span class="item-label">其它扣款</span><input class="item-input" id="otherDeduction" value="${salaryConfig.otherDeduction}" step="any" inputmode="decimal"></div>
                        <div class="salary-item"><span class="item-label">其它补贴</span><input class="item-input" id="otherAllowance" value="${salaryConfig.otherAllowance}" step="any" inputmode="decimal"></div>
                        <div class="salary-item"><span class="item-label">五险一金</span><input class="item-input" id="insurance" value="${salaryConfig.insuranceDeduction}" step="any" inputmode="decimal"></div>
                        <div class="salary-item"><span class="item-label">个人所得税</span><input class="item-input" id="tax" value="${salaryConfig.personalTax}" step="any" inputmode="decimal"></div>
                        <div class="salary-item"><span class="item-label">餐补(自动)</span><input class="item-input" id="meal" value="${sal.meal.toFixed(1)}" readonly></div>
                        <div class="salary-item"><span class="item-label">夜班补贴</span><input class="item-input" id="nightAllow" value="${sal.nightAllow.toFixed(1)}" step="any" inputmode="decimal"></div>
                        <div class="salary-item"><span class="item-label">房租水电</span><input class="item-input" id="rent" value="${salaryConfig.rentDeduction}" step="any" inputmode="decimal"></div>
                        <div class="salary-item"><span class="item-label">用餐费</span><input class="item-input" id="mealFee" value="${salaryConfig.mealFeeDeduction}" step="any" inputmode="decimal"></div>
                        <div class="salary-item"><span class="item-label">高温补贴</span><input class="item-input" id="highTemp" value="${salaryConfig.highTempAllowance}" step="any" inputmode="decimal"></div>
                        <div class="salary-item"><span class="item-label">工龄补贴</span><input class="item-input" id="seniority" value="${salaryConfig.seniorityAllowance}" step="any" inputmode="decimal"></div>
                    </div>
                </div>
            </div>

            <div id="calendarArea" class="calendar-section"></div>
        `;

        renderCalendar();
        bindDynamicEvents();
        updateCalendarVisibility();
    }

    function renderCalendar(){
        const calArea = document.getElementById('calendarArea');
        const days = getDays(year,month), first = getFirstDay(year,month);
        let html = '<div class="calendar-grid">';
        const start = first===0?6:first-1;
        for(let i=0;i<start;i++) html += '<div class="cal-day empty"></div>';
        const labels = {work:'白',night:'夜',rest:'休',holiday:'法'};
        for(let d=1; d<=days; d++){
            const row = data[d-1]||{};
            let cls = 'cal-day';
            if(row.shift) cls += ' ' + row.shift;
            html += `<div class="${cls}" data-day="${d-1}"><span class="day-number">${d}</span>${row.shift?`<span class="day-label">${labels[row.shift]}</span>`:''}</div>`;
        }
        html += '</div>';
        calArea.innerHTML = html;
    }

    function bindStaticEvents() {
        cardsWrapper.addEventListener('pointerdown', (e) => {
            const toggleBtn = e.target.closest('[data-toggle]');
            if(!toggleBtn || e.target.closest('input, button')) return;
            e.preventDefault();
            const section = toggleBtn.closest('.section');
            section.classList.toggle('expanded');
            updateCalendarVisibility();
        });

        document.querySelectorAll('#modalShiftSelector .shift-option-big').forEach(b => {
            b.addEventListener('click', ()=> setShiftFromModal(b.dataset.shift));
        });
        $('modalSaveBtn').addEventListener('click', saveModal);
        modalOverlay.addEventListener('click', e => { if(e.target === modalOverlay) closeModal(); });

        $('prevMonthBtn').addEventListener('click', ()=> changeMonth(-1));
        $('nextMonthBtn').addEventListener('click', ()=> changeMonth(1));
        $('clearDataBtn').addEventListener('click', ()=>{
            if(confirm('确认清空当月所有排班与工时数据？此操作不可恢复。')){
                clearAllData();
                renderAll();
                showToast('当月数据已清空');
            }
        });
    }

    function bindDynamicEvents() {
        const fullWrapper = $('fullHoursWrapper');
        if (fullWrapper) {
            const display = fullWrapper.querySelector('.display-text');
            const input = fullWrapper.querySelector('input');

            fullWrapper.addEventListener('click', (e) => {
                if (fullWrapper.classList.contains('editing')) return;
                e.stopPropagation();
                fullWrapper.classList.add('editing');
                input.value = fullWorkHours;
                input.focus();
            });

            const saveFull = () => {
                const val = parseFloat(input.value);
                if (!isNaN(val) && val > 0) {
                    fullWorkHours = val;
                    saveFullHours();
                    renderAll();
                } else {
                    input.value = fullWorkHours;
                }
                fullWrapper.classList.remove('editing');
            };

            input.addEventListener('blur', saveFull);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    input.blur();
                }
            });
        }

        const calendarArea = $('calendarArea');
        calendarArea?.addEventListener('click', (e) => {
            const dayEl = e.target.closest('.cal-day:not(.empty)');
            if(!dayEl) return;
            openModal(parseInt(dayEl.dataset.day));
        });

        const bindChange = (id, setter) => {
            const el = $(id); if(!el) return;
            el.addEventListener('change', ()=>{ setter(parseFloat(el.value)||0); saveSalaryConfig(); updateSalaryDisplay(); });
        };
        bindChange('baseSalary', v=>salaryConfig.baseSalary=v);
        bindChange('performance', v=>salaryConfig.performance=v);
        bindChange('otherDeduction', v=>salaryConfig.otherDeduction=v);
        bindChange('otherAllowance', v=>salaryConfig.otherAllowance=v);
        bindChange('insurance', v=>salaryConfig.insuranceDeduction=v);
        bindChange('tax', v=>salaryConfig.personalTax=v);
        bindChange('rent', v=>salaryConfig.rentDeduction=v);
        bindChange('mealFee', v=>salaryConfig.mealFeeDeduction=v);
        bindChange('highTemp', v=>salaryConfig.highTempAllowance=v);
        bindChange('seniority', v=>salaryConfig.seniorityAllowance=v);

        const nightEl = $('nightAllow');
        nightEl?.addEventListener('change', function(){
            const v = this.value.trim();
            const num = parseFloat(v);
            salaryConfig.nightAllowanceManual = (v === '' || isNaN(num)) ? null : num;
            saveSalaryConfig(); updateSalaryDisplay();
        });

        const manualEl = $('manualOvertime');
        manualEl?.addEventListener('change', function(){
            const v = this.value.trim();
            const num = parseFloat(v);
            salaryConfig.manualOvertimePay = (v === '' || isNaN(num)) ? null : num;
            saveSalaryConfig(); updateSalaryDisplay();
        });
        $('resetOvertimeBtn')?.addEventListener('click', ()=>{
            salaryConfig.manualOvertimePay = null;
            saveSalaryConfig(); updateSalaryDisplay();
        });
    }

    function updateSalaryDisplay(){
        const sal = computeSalary();
        const oRes = sal.overtimeRes;
        const netEl = $('netSalaryValue');
        if(netEl) netEl.textContent = sal.net.toFixed(1);
        const grossEl = document.querySelector('#salarySection .stat-left span:last-child');
        if(grossEl) grossEl.textContent = `应发 ${sal.gross.toFixed(1)}`;
        const mealEl = $('meal');
        if(mealEl) mealEl.value = sal.meal.toFixed(1);
        const nightEl = $('nightAllow');
        if(nightEl && salaryConfig.nightAllowanceManual===null) nightEl.value = sal.autoNight.toFixed(1);
        const otTotal = $('overtimePayTotal');
        if(otTotal) otTotal.textContent = oRes.finalOvertimePay.toFixed(1);
        const otSub = $('overtimePaySub');
        if(otSub) otSub.innerHTML = `${salaryConfig.manualOvertimePay !== null ? '手动 ' : ''}延时 ${oRes.normalOvertimePay.toFixed(1)} | 法定 ${oRes.holidayOvertimePay.toFixed(1)}`;
        const normalPayVal = $('normalOvertimePayValue');
        if(normalPayVal) normalPayVal.textContent = oRes.normalOvertimePay.toFixed(1);
        const holidayPayVal = $('holidayOvertimePayValue');
        if(holidayPayVal) holidayPayVal.textContent = oRes.holidayOvertimePay.toFixed(1);
    }

    function changeMonth(delta){
        let nm = month+delta, ny = year;
        if(nm<1){ nm=12; ny--; } if(nm>12){ nm=1; ny++; }
        if(ny<2020||ny>2099) return;
        year = ny; month = nm;
        loadData();
        const max = getDays(year,month);
        if (selectedDay == null || selectedDay < 0 || selectedDay >= max) {
            const today = new Date();
            selectedDay = (today.getFullYear() === year && today.getMonth()+1 === month) ? today.getDate()-1 : 0;
        }
        closeModal();
        renderAll();
    }

    function updateThemeColor(){
        const isLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        themeMeta.setAttribute('content', isLight ? '#FF6B44' : '#FF5E3A');
    }
    updateThemeColor();
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', updateThemeColor);

    const now = new Date();
    year = now.getFullYear(); month = now.getMonth()+1;
    selectedDay = now.getDate()-1;
    loadData(); loadSalaryConfig(); loadFullHours();
    bindStaticEvents();
    renderAll();
})();
</script>
</body>
</html>
