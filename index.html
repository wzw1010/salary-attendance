<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="考勤薪资">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <title>考勤·薪资预算</title>
    <style>
        :root {
            /* 背景 */
            --bg-primary: #000000;
            --bg-card: rgba(255, 255, 255, 0.06);
            --bg-card-solid: #1c1c1e;
            --bg-input: rgba(255, 255, 255, 0.08);
            --border-card: rgba(255, 255, 255, 0.08);
            --border-input: rgba(255, 255, 255, 0.12);
            /* 文字 */
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-tertiary: rgba(255, 255, 255, 0.4);
            /* 强调 */
            --accent: #F0B90B;
            --accent-dim: rgba(240, 185, 11, 0.3);
            /* 班次色 */
            --color-work: #7aa9ff;
            --color-night: #b794f4;
            --color-rest: #9ca3af;
            --color-holiday: #fbbf24;
            --bg-work: rgba(122, 169, 255, 0.25);
            --bg-night: rgba(183, 148, 244, 0.25);
            --bg-rest: rgba(156, 163, 175, 0.25);
            --bg-holiday: rgba(251, 191, 36, 0.25);
            /* 圆角 */
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-full: 50%;
            /* 间距 */
            --space-xs: 6px;
            --space-sm: 10px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            /* 字体 */
            --font-caption: 11px;
            --font-body: 15px;
            --font-title: 20px;
            --font-large: 32px;
            /* 安全区 */
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
            --nav-height: 56px;
            /* 阴影 */
            --shadow-card: 0 4px 12px rgba(0,0,0,0.4);
        }

        /* 浅色模式 */
        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f2f2f7;
                --bg-card: rgba(0, 0, 0, 0.04);
                --bg-card-solid: #ffffff;
                --bg-input: rgba(0, 0, 0, 0.06);
                --border-card: rgba(0, 0, 0, 0.08);
                --border-input: rgba(0, 0, 0, 0.12);
                --text-primary: #000000;
                --text-secondary: rgba(0, 0, 0, 0.55);
                --text-tertiary: rgba(0, 0, 0, 0.35);
                --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
            }
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { height:100%; overflow-x:hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100dvh;
            padding-top: calc(50px + var(--safe-top));
            padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 20px);
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s;
        }
        .app { max-width: 500px; margin:0 auto; }

        /* 头部 */
        .nav-header {
            position:fixed; top:var(--safe-top); left:50%; transform:translateX(-50%);
            width:100%; max-width:500px; z-index:10;
            background: var(--bg-primary);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            display:flex; align-items:center; padding:12px var(--space-md) 8px;
            border-bottom: 1px solid var(--border-card);
            min-height:50px; gap:var(--space-sm);
        }
        .header-title {
            display:flex; align-items:center; gap:var(--space-sm);
            font-weight:700; font-size:var(--font-title); color: var(--accent);
            white-space:nowrap; flex-shrink:0; margin-right:auto; margin-left:1em;
        }
        .header-title svg { width:22px; height:22px; fill:currentColor; }
        .month-control { display:flex; align-items:center; gap:4px; flex-shrink:0; margin-right:0.5em; }
        .month-arrow {
            width:32px; height:32px; display:flex; align-items:center; justify-content:center;
            background: var(--bg-input); border-radius:var(--radius-full);
            cursor:pointer; font-size:13px; color:var(--text-secondary); border:none;
            transition:background 0.2s;
        }
        .month-arrow:active { background: rgba(128,128,128,0.2); }

        .content { padding:0 var(--space-md); }
        .tab-pane { display:none; animation:fadeIn 0.25s ease-out; }
        .tab-pane.active { display:block; }
        @keyframes fadeIn { from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }

        /* 分隔线（弱化） */
        .divider { margin:var(--space-lg) 0; height:1px; background:var(--border-card); }

        /* ===== 卡片系统 ===== */
        .card, .stat-card, .param-card, .overtime-card, .salary-result {
            background: var(--bg-card);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-card);
        }

        /* 排班概览（非对称） */
        .overview-grid {
            display:grid; grid-template-columns:1fr 1fr 1fr; gap:var(--space-sm);
            margin-top: var(--space-md);
        }
        .overview-main {
            grid-column: span 2;
            background: var(--bg-card);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border:1px solid var(--border-card); border-radius:var(--radius-md);
            padding: var(--space-lg) var(--space-md);
            display:flex; align-items:center; justify-content:space-between;
            box-shadow: var(--shadow-card);
        }
        .overview-info { display:flex; flex-direction:column; }
        .overview-label { font-size:var(--font-caption); color:var(--text-secondary); font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
        .overview-number { font-size:var(--font-large); font-weight:700; color:var(--text-primary); line-height:1.1; margin-top:2px; }
        .overview-sub { font-size:var(--font-caption); color:var(--text-tertiary); margin-top:2px; }

        /* 圆环进度 */
        .progress-ring { width:56px; height:56px; }
        .progress-ring circle { fill:none; stroke-width:4; stroke-linecap:round; }
        .ring-bg { stroke: rgba(128,128,128,0.15); }
        .ring-fill { stroke: var(--accent); transition: stroke-dashoffset 0.5s ease; }

        .stat-mini {
            background: var(--bg-card); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border:1px solid var(--border-card); border-radius:var(--radius-md);
            padding:var(--space-md); display:flex; flex-direction:column; justify-content:center;
            box-shadow: var(--shadow-card);
        }
        .stat-mini-label { font-size:var(--font-caption); color:var(--text-secondary); }
        .stat-mini-value { font-size:var(--font-body); font-weight:600; color:var(--text-primary); margin-top:2px; }

        /* 日历 */
        .calendar-week { display:grid; grid-template-columns:repeat(7,1fr); text-align:center; margin-bottom:var(--space-xs); color:var(--text-secondary); font-size:var(--font-caption); font-weight:500; }
        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
        .cal-day {
            aspect-ratio:1/1; background:var(--bg-card); border-radius:var(--radius-sm);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            cursor:pointer; transition:transform 0.15s, box-shadow 0.2s; border:1px solid transparent;
            position:relative;
        }
        .cal-day:active { transform:scale(0.95); }
        .cal-day.empty { background:transparent; box-shadow:none; pointer-events:none; }
        .cal-day.today { box-shadow:inset 0 0 0 2px var(--accent); }
        .cal-day.work { background:var(--bg-work); }
        .cal-day.night { background:var(--bg-night); }
        .cal-day.rest { background:var(--bg-rest); }
        .cal-day.holiday { background:var(--bg-holiday); }
        .day-number { font-size:var(--font-body); font-weight:600; color:var(--text-primary); }
        .day-label { font-size:9px; font-weight:600; color:var(--text-secondary); margin-top:1px; }

        /* 记录网格 */
        .record-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:var(--space-sm); margin-top:var(--space-md); }
        .record-cell {
            position:relative; border-radius:var(--radius-md); padding:14px 4px 8px;
            text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
            gap:4px; box-shadow:var(--shadow-card); transition:all 0.2s; cursor:pointer; min-height:78px;
            background:var(--bg-card); border:1px solid var(--border-card);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
        }
        .record-cell:active { transform:scale(0.96); }
        .record-cell.editing { border-color: var(--accent); background: var(--bg-card); }
        .record-cell.work { background:var(--bg-work); } .record-cell.night { background:var(--bg-night); }
        .record-cell.rest { background:var(--bg-rest); } .record-cell.holiday { background:var(--bg-holiday); }
        .record-cell.none { background:var(--bg-card); }
        .cell-date { position:absolute; top:6px; right:8px; font-size:var(--font-caption); font-weight:700; color:var(--text-tertiary); z-index:3; }
        .cell-hours { display:flex; gap:8px; align-items:center; justify-content:center; position:relative; z-index:4; }
        .cell-hour-item { display:flex; flex-direction:column; align-items:center; line-height:1.2; }
        .cell-hour-label { font-size:var(--font-caption); font-weight:500; color:var(--text-secondary); }
        .cell-hour-value { font-weight:700; font-size:var(--font-body); color:var(--text-primary); }
        .edit-overlay {
            display:none; position:absolute; inset:0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px);
            border-radius:var(--radius-md); flex-direction:column; align-items:center; justify-content:center;
            gap:6px; z-index:10; padding:8px;
        }
        .record-cell.editing .edit-overlay { display:flex; }
        .edit-overlay input {
            width:80%; height:30px; background:var(--bg-input); border:1px solid var(--border-input);
            border-radius:var(--radius-sm); text-align:center; font-size:var(--font-body); font-weight:600;
            color:var(--text-primary); outline:none;
        }
        .edit-done {
            width:28px; height:28px; border-radius:var(--radius-full); background:var(--accent);
            border:none; color:#000; font-size:16px; font-weight:700; cursor:pointer;
            position:absolute; top:6px; right:6px; z-index:11;
            display:flex; align-items:center; justify-content:center;
        }

        /* 薪资参数网格 */
        .params-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--space-sm); margin-top:var(--space-md); }
        .param-card {
            padding:var(--space-md); display:flex; flex-direction:column; align-items:center; justify-content:center;
            min-height:90px; gap:4px; transition:transform 0.15s;
        }
        .param-card:active { transform:scale(0.97); }
        .param-label { font-size:var(--font-caption); font-weight:500; color:var(--text-secondary); }
        .param-card.income .param-label { color: #34c759; } /* 绿色收入 */
        .param-card.deduction .param-label { color: #ff453a; } /* 红色扣款 */
        .input-field {
            background:var(--bg-input); border:1px solid var(--border-input); border-radius:var(--radius-sm);
            padding:8px 6px; font-size:var(--font-body); font-weight:600; color:var(--text-primary);
            text-align:center; width:100%; font-family:inherit; -webkit-appearance:none; outline:none;
            transition:border-color 0.2s;
        }
        .input-field:focus { border-color: var(--accent); }

        .overtime-row { display:flex; gap:var(--space-sm); margin-top:var(--space-md); }
        .overtime-card { flex:1; padding:var(--space-md); text-align:center; display:flex; flex-direction:column; justify-content:center; gap:4px; min-height:85px; }
        .overtime-title { font-size:var(--font-caption); color:var(--text-secondary); }
        .overtime-amount { font-size:var(--font-body); font-weight:700; color:var(--text-primary); }

        .salary-result { padding:var(--space-lg); margin-top:var(--space-md); }
        .result-line { display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-sm); }
        .result-label { font-size:var(--font-body); color:var(--text-secondary); }
        .result-value { font-size:var(--font-title); font-weight:700; }
        .result-value.accent { color: var(--accent); }

        .btn-small {
            background:var(--bg-input); border:1px solid var(--border-input); border-radius:var(--radius-sm);
            padding:4px 12px; font-size:var(--font-caption); cursor:pointer; color:var(--text-primary);
            transition:background 0.2s;
        }
        .btn-small:active { background: rgba(128,128,128,0.2); }

        /* 底部导航 */
        .bottom-nav {
            position:fixed; bottom:0; left:50%; transform:translateX(-50%);
            width:100%; max-width:500px; background: var(--bg-primary);
            display:flex; justify-content:space-around; align-items:flex-end;
            height:var(--nav-height); padding-bottom: var(--safe-bottom); z-index:50;
            border-top:1px solid var(--border-card);
        }
        .nav-item {
            width:48px; height:40px; border-radius:var(--radius-md); display:flex; align-items:center;
            justify-content:center; color: var(--text-secondary); transition:0.2s; cursor:pointer;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.8; }

        /* 模态 */
        .modal-overlay {
            position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            opacity:0; pointer-events:none; transition:0.3s;
        }
        .modal-overlay.show { opacity:1; pointer-events:auto; }
        .option-group { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-sm); width:85%; max-width:360px; }
        .shift-option {
            background: var(--bg-card); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border:1px solid var(--border-card); border-radius:var(--radius-lg); padding:24px 12px;
            cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:8px;
            color:var(--text-primary); transition:all 0.25s; opacity:0; transform:translateY(12px);
        }
        .modal-overlay.show .shift-option { opacity:1; transform:translateY(0); }
        .shift-option:active { transform:scale(0.95); }
        .shift-option svg { width:28px; height:28px; stroke:currentColor; fill:none; stroke-width:1.6; }
        .shift-label { font-size:var(--font-body); font-weight:600; }
        .shift-option.work { color:var(--color-work); background:rgba(122,169,255,0.2); }
        .shift-option.night { color:var(--color-night); background:rgba(183,148,244,0.2); }
        .shift-option.rest { color:var(--color-rest); background:rgba(156,163,175,0.2); }
        .shift-option.holiday { color:var(--color-holiday); background:rgba(251,191,36,0.2); }

        .toast-msg {
            position:fixed; bottom:calc(var(--nav-height) + var(--safe-bottom) + 20px); left:50%;
            transform:translateX(-50%); background:var(--bg-card-solid); padding:10px 24px;
            border-radius:50px; font-size:var(--font-caption); z-index:200; opacity:0; transition:0.3s;
            box-shadow:var(--shadow-card); pointer-events:none;
        }
        .toast-msg.show { opacity:1; bottom:calc(var(--nav-height) + var(--safe-bottom) + 28px); }
    </style>
</head>
<body>
<div class="app">
    <div class="nav-header">
        <div class="header-title">
            <svg fill="currentColor" viewBox="0 0 210 256"><path d="M174.55 144.5c-1.4-4-5-6.5-9.2-6.5H159V23c0-11.7-9.3-21-21-21H25C12.6 2 2 12.6 2 25v183c0 11.9 11 22 22.8 22h114.2c1.2 0 2.3 1 2.2 2.2-.1 1.3-1.2 1.8-2.4 1.8h-45.5L128 254h80l-33.4-109.5zM82 220.2c-3.2 0-5.6-2.4-5.6-5.6 0-3 2.6-5.6 5.6-5.6 3.2 0 5.6 2.4 5.6 5.6 0 3.2-2.4 5.6-5.6 5.6zM144 138h-19.7c-5.3 0-9.8 4.7-9.8 10s4.5 10 9.8 10h19.8v42H18V31h126v107zM80.6 134.9c23.7 0 43-19.2 43-43s-19.2-43-43-43-43 19.2-43 43 19.2 43 43 43zm-2.4-39.4c-7.9-2.8-12.8-6.7-12.8-13.8 0-6.5 4.3-11.7 12.3-13.3v-7.1h5.9v6.7c4.9 0 8.5 1 11.1 2.4l-2.4 8.5c-2-.8-5.1-2.2-9.5-2.2s-6.7 2.2-6.7 4.3c0 3 2.8 4.1 8.7 6.5 8.1 3 11.9 7.1 11.9 13.8 0 6.7-4.1 11.9-12.8 13.8v6.7h-5.9v-6.5c-5.1 0-10.3-1.4-12.8-2.8l2.2-8.7c2.8 1.4 7.1 3 11.7 3 4.9 0 7.3-2.2 7.3-5.1s-2.4-4.5-8.2-6.7z"/></svg>

    <div class="content">

<script>
(function(){
    const STORAGE_PREFIX = 'workhours_v36_';
    const DEF_NORMAL = 8, DEF_OVERTIME = 4;
    const SALARY_STORAGE = 'salary_config_v27';
    const FULL_HOURS_KEY = 'full_work_hours_v18';

    let year, month, data = [], activeTab = 'schedule';
    let editingRow = null, pendingRow = null;

    let salaryConfig = {
        baseSalary:0, performance:0, otherDeduction:0, otherAllowance:0,
        insuranceDeduction:0, personalTax:0, manualOvertimePay:null,
        rentDeduction:0, mealFeeDeduction:0, highTempAllowance:0, seniorityAllowance:0,
        nightAllowanceManual:null
    };
    let fullWorkHours = 160;

    const $ = id => document.getElementById(id);
    const overviewEl = $('scheduleOverviewContainer');
    const calendarEl = $('scheduleCalendarContainer');
    const recordsEl = $('recordsListContainer');
    const paramsEl = $('salaryParamsContainer');
    const overtimeEl = $('salaryOvertimeContainer');
    const resultEl = $('salaryResultContainer');
    const toastEl = $('toastMsg');
    const modalEl = $('shiftModal');

    function showToast(msg) {
        toastEl.textContent = msg; toastEl.classList.add('show');
        clearTimeout(toastEl._timeout);
        toastEl._timeout = setTimeout(() => toastEl.classList.remove('show'), 1800);
    }
    const getDays = (y,m) => new Date(y,m,0).getDate();
    const getFirstDay = (y,m) => new Date(y,m-1,1).getDay();
    const getStorageKey = () => STORAGE_PREFIX + year + '_' + month;

    function loadData() {
        const raw = localStorage.getItem(getStorageKey());
        const days = getDays(year, month);
        if(raw){ try{ const p=JSON.parse(raw); data=p.rows||[]; }catch(e){data=[];} }else data=[];
        for(let i=0;i<data.length;i++){ if(!data[i].shift)data[i].shift=''; if(data[i].normal===undefined)data[i].normal=0; if(data[i].overtime===undefined)data[i].overtime=0; }
        while(data.length<days) data.push({shift:'',normal:0,overtime:0});
        while(data.length>days) data.pop();
    }
    function saveData(){ localStorage.setItem(getStorageKey(), JSON.stringify({year,month,rows:data})); }
    function loadSalaryConfig(){
        try{ const s=localStorage.getItem(SALARY_STORAGE); if(s) salaryConfig=JSON.parse(s); }catch(e){}
        salaryConfig={ baseSalary:0,performance:0,otherDeduction:0,otherAllowance:0,insuranceDeduction:0,personalTax:0,manualOvertimePay:null,rentDeduction:0,mealFeeDeduction:0,highTempAllowance:0,seniorityAllowance:0,nightAllowanceManual:null,...salaryConfig };
    }
    function saveSalaryConfig(){ localStorage.setItem(SALARY_STORAGE, JSON.stringify(salaryConfig)); }
    function loadFullHours(){ try{ const v=localStorage.getItem(FULL_HOURS_KEY); if(v!==null) fullWorkHours=parseInt(v); }catch(e){} if(isNaN(fullWorkHours)||fullWorkHours<0) fullWorkHours=160; }
    function saveFullHours(){ localStorage.setItem(FULL_HOURS_KEY, fullWorkHours.toString()); }

    // 计算逻辑完全保留
    function computeWorkStats(){
        let total=0, overtime=0, holidayOvertime=0;
        for(let i=0;i<data.length;i++){
            const d=data[i], n=d.normal||0, o=d.overtime||0;
            total+=n;
            if(d.shift==='holiday') holidayOvertime+=o;
            else{ total+=o; overtime+=o; }
        }
        return {totalHours:total, overtimeHours:overtime, holidayOvertime};
    }
    function getNightShiftCount(){ let c=0; for(let i=0;i<data.length;i++) if(data[i].shift==='night') c++; return c; }
    function computeOvertimeAndSalary(){
        let nonHoliday=0, holidayOvt=0;
        for(let i=0;i<data.length;i++){
            const d=data[i];
            if(d.shift==='holiday'){ holidayOvt+=(d.overtime||0); continue; }
            nonHoliday+=(d.normal||0)+(d.overtime||0);
        }
        const overtimeHrs = Math.max(0, nonHoliday-fullWorkHours);
        const hourRate = salaryConfig.baseSalary/21.75/8;
        const normalPay = hourRate*1.5*overtimeHrs;
        const holidayPay = hourRate*3*holidayOvt;
        const autoPay = normalPay+holidayPay;
        let finalPay = autoPay;
        if(salaryConfig.manualOvertimePay!==null) finalPay=salaryConfig.manualOvertimePay;
        return {overtimeHours:overtimeHrs, holidayOvertimeHours:holidayOvt, normalOvertimePay:normalPay, holidayOvertimePay:holidayPay, autoOvertimePay:autoPay, finalOvertimePay:finalPay, hourRate};
    }
    function computeSalary(){
        const oRes = computeOvertimeAndSalary();
        const stats = computeWorkStats();
        const meal = (stats.totalHours+stats.holidayOvertime)*1;
        const nightCnt = getNightShiftCount();
        const autoNight = nightCnt*30;
        const nightAllow = salaryConfig.nightAllowanceManual!==null ? salaryConfig.nightAllowanceManual : autoNight;
        const gross = salaryConfig.baseSalary+salaryConfig.performance+salaryConfig.otherAllowance+meal+oRes.finalOvertimePay+nightAllow+salaryConfig.highTempAllowance+salaryConfig.seniorityAllowance-salaryConfig.otherDeduction-salaryConfig.rentDeduction-salaryConfig.mealFeeDeduction;
        const net = gross-salaryConfig.insuranceDeduction-salaryConfig.personalTax;
        return {gross,net,mealAllowance:meal,nightAllowance:nightAllow,autoNightAllowance:autoNight,overtimeRes:oRes};
    }

    // 渲染满勤圆环
    function renderProgressRing(percent){
        const circumference = 2 * Math.PI * 22; // r=22
        const offset = circumference - (percent/100)*circumference;
        return `<svg class="progress-ring" viewBox="0 0 56 56">
            <circle class="ring-bg" cx="28" cy="28" r="22"/>
            <circle class="ring-fill" cx="28" cy="28" r="22" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" transform="rotate(-90 28 28)"/>
        </svg>`;
    }

    function renderSchedule(){
        const stats = computeWorkStats();
        const percent = Math.min(100, (stats.totalHours / fullWorkHours)*100);
        const ringHtml = renderProgressRing(percent);
        overviewEl.innerHTML = `
            <div class="overview-main">
                <div class="overview-info">
                    <span class="overview-label">总工时</span>
                    <span class="overview-number">${stats.totalHours.toFixed(1)}</span>
                    <span class="overview-sub">满勤 ${fullWorkHours}h</span>
                </div>
                ${ringHtml}
            </div>
            <div class="stat-mini">
                <span class="stat-mini-label">加班</span>
                <span class="stat-mini-value">${stats.overtimeHours.toFixed(1)}h</span>
            </div>
            <div class="stat-mini">
                <span class="stat-mini-label">法定加班</span>
                <span class="stat-mini-value">${stats.holidayOvertime.toFixed(1)}h</span>
            </div>`;

        const days=getDays(year,month), first=getFirstDay(year,month);
        const today=new Date(), isCurr=(today.getFullYear()===year&&today.getMonth()+1===month), todayDate=today.getDate();
        let cal='<div class="calendar-week"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div><div class="calendar-grid">';
        let start= first===0?6:first-1;
        for(let i=0;i<start;i++) cal+='<div class="cal-day empty"></div>';
        const labelMap={work:'白班',night:'夜班',rest:'休息',holiday:'法定'};
        for(let d=1;d<=days;d++){
            const row=data[d-1]||{};
            let cls='cal-day';
            if(row.shift) cls+=' '+row.shift;
            if(isCurr&&d===todayDate) cls+=' today';
            cal+=`<div class="${cls}" onclick="window.app.openShift(${d-1})"><div class="day-number">${d}</div>${row.shift?`<div class="day-label">${labelMap[row.shift]}</div>`:''}</div>`;
        }
        cal+='</div>';
        calendarEl.innerHTML=cal;
    }

    function renderRecords(){
        const days=getDays(year,month);
        let html='';
        for(let i=0;i<days;i++){
            const row=data[i], isEdit=(editingRow===i);
            html+=`<div class="record-cell ${row.shift||'none'}${isEdit?' editing':''}" data-row="${i}">
                <span class="cell-date">${i+1}</span>
                <div class="cell-hours"><div class="cell-hour-item"><span class="cell-hour-label">平时</span><span class="cell-hour-value">${(row.normal||0).toFixed(1)}</span></div><div class="cell-hour-item"><span class="cell-hour-label">加班</span><span class="cell-hour-value">${(row.overtime||0).toFixed(1)}</span></div></div>
                <div class="edit-overlay"><input type="number" class="edit-normal" step="0.5" value="${row.normal}" placeholder="平时"><input type="number" class="edit-overtime" step="0.5" value="${row.overtime}" placeholder="加班"><button class="edit-done">✓</button></div>
            </div>`;
        }
        recordsEl.innerHTML=html;
        document.querySelectorAll('#recordsListContainer .record-cell').forEach(cell=>{
            cell.addEventListener('click',function(e){
                if(e.target.classList.contains('edit-done')) return;
                const idx=parseInt(cell.dataset.row);
                if(editingRow===idx) return;
                if(editingRow!==null) finishEditing(editingRow);
                editingRow=idx; renderRecords();
                setTimeout(()=>{ const inp=document.querySelector('.record-cell.editing .edit-overtime'); if(inp) inp.focus(); },100);
            });
            const done=cell.querySelector('.edit-done');
            if(done) done.addEventListener('click',function(e){ e.stopPropagation(); const idx=parseInt(cell.dataset.row); data[idx].normal=Math.min(24,Math.max(0,parseFloat(cell.querySelector('.edit-normal')?.value)||0)); data[idx].overtime=Math.min(24,Math.max(0,parseFloat(cell.querySelector('.edit-overtime')?.value)||0)); saveData(); editingRow=null; renderRecords(); renderSchedule(); if(activeTab==='salary') renderSalaryResultOnly(); });
        });
    }
    function finishEditing(idx){
        if(idx===null) return;
        const card=document.querySelector(`.record-cell[data-row="${idx}"]`);
        if(card){ data[idx].normal=Math.min(24,Math.max(0,parseFloat(card.querySelector('.edit-normal')?.value)||0)); data[idx].overtime=Math.min(24,Math.max(0,parseFloat(card.querySelector('.edit-overtime')?.value)||0)); saveData(); }
        editingRow=null; renderRecords(); renderSchedule(); if(activeTab==='salary') renderSalaryResultOnly();
    }

    function renderSalaryResultOnly(){
        const salary=computeSalary(), oRes=salary.overtimeRes;
        overtimeEl.innerHTML=`
            <div class="overtime-row">
                <div class="overtime-card"><span class="overtime-title">延时加班费</span><span class="overtime-amount">${oRes.normalOvertimePay.toFixed(2)} 元</span></div>
                <div class="overtime-card"><span class="overtime-title">法假加班费</span><span class="overtime-amount">${oRes.holidayOvertimePay.toFixed(2)} 元</span></div>
                <div class="overtime-card">
                    <span class="overtime-title">手动调整</span>
                    <input type="number" id="manualOvertimeInput" class="input-field" value="${salaryConfig.manualOvertimePay!==null?salaryConfig.manualOvertimePay:''}" step="10" placeholder="自动" style="font-size:12px;">
                    <button id="resetOvertimeBtn" class="btn-small" style="margin-top:4px;">恢复自动</button>
                </div>
            </div>`;
        resultEl.innerHTML=`
            <div class="salary-result">
                <div class="result-line"><span class="result-label">应发工资</span><span class="result-value">${salary.gross.toFixed(2)}</span></div>
                <div class="result-line" style="margin-top:8px;"><span class="result-label">实发工资</span><span class="result-value accent">${salary.net.toFixed(2)}</span></div>
            </div>`;
        bindOvertimeEvents();
    }

    function renderSalaryPage(){
        const salary=computeSalary(), oRes=salary.overtimeRes;
        const mealAuto=salary.mealAllowance, autoNight=salary.autoNightAllowance, nightDisplay=salaryConfig.nightAllowanceManual!==null?salaryConfig.nightAllowanceManual:autoNight;
        paramsEl.innerHTML=`
            <div class="param-card income"><span class="param-label">底薪</span><input id="baseSalaryParam" class="input-field" value="${salaryConfig.baseSalary}" step="100"></div>
            <div class="param-card income"><span class="param-label">绩效</span><input id="performanceParam" class="input-field" value="${salaryConfig.performance}" step="100"></div>
            <div class="param-card deduction"><span class="param-label">其他扣款</span><input id="otherDeductionParam" class="input-field" value="${salaryConfig.otherDeduction}" step="50"></div>
            <div class="param-card income"><span class="param-label">其它补贴</span><input id="otherAllowanceParam" class="input-field" value="${salaryConfig.otherAllowance}" step="50"></div>
            <div class="param-card deduction"><span class="param-label">五险一金</span><input id="insuranceParam" class="input-field" value="${salaryConfig.insuranceDeduction}" step="100"></div>
            <div class="param-card deduction"><span class="param-label">个税</span><input id="taxParam" class="input-field" value="${salaryConfig.personalTax}" step="100"></div>
            <div class="param-card income"><span class="param-label">餐补</span><input id="mealDisplay" class="input-field" value="${mealAuto.toFixed(2)}" readonly></div>
            <div class="param-card income"><span class="param-label">夜班补贴</span><input id="nightAllowanceInput" class="input-field" value="${nightDisplay.toFixed(2)}" step="10"></div>
            <div class="param-card deduction"><span class="param-label">房租水电</span><input id="rentDeductionParam" class="input-field" value="${salaryConfig.rentDeduction}" step="50"></div>
            <div class="param-card deduction"><span class="param-label">用餐费</span><input id="mealFeeParam" class="input-field" value="${salaryConfig.mealFeeDeduction}" step="50"></div>
            <div class="param-card income"><span class="param-label">高温补贴</span><input id="highTempParam" class="input-field" value="${salaryConfig.highTempAllowance}" step="50"></div>
            <div class="param-card income"><span class="param-label">工龄补贴</span><input id="seniorityParam" class="input-field" value="${salaryConfig.seniorityAllowance}" step="50"></div>
        `;
        renderSalaryResultOnly();
        const bindChange=(id,setter)=>{
            const el=document.getElementById(id); if(!el) return;
            el.addEventListener('change',function(){ setter(parseFloat(this.value)||0); saveSalaryConfig(); renderSalaryResultOnly(); });
        };
        bindChange('baseSalaryParam',v=>salaryConfig.baseSalary=v);
        bindChange('performanceParam',v=>salaryConfig.performance=v);
        bindChange('otherDeductionParam',v=>salaryConfig.otherDeduction=v);
        bindChange('otherAllowanceParam',v=>salaryConfig.otherAllowance=v);
        bindChange('insuranceParam',v=>salaryConfig.insuranceDeduction=v);
        bindChange('taxParam',v=>salaryConfig.personalTax=v);
        bindChange('rentDeductionParam',v=>salaryConfig.rentDeduction=v);
        bindChange('mealFeeParam',v=>salaryConfig.mealFeeDeduction=v);
        bindChange('highTempParam',v=>salaryConfig.highTempAllowance=v);
        bindChange('seniorityParam',v=>salaryConfig.seniorityAllowance=v);
        const nightInput=document.getElementById('nightAllowanceInput');
        if(nightInput) nightInput.addEventListener('change',function(){ const val=this.value.trim(); salaryConfig.nightAllowanceManual=val===''?null:parseFloat(val); saveSalaryConfig(); renderSalaryResultOnly(); });
    }
    function bindOvertimeEvents(){
        const mi=document.getElementById('manualOvertimeInput');
        if(mi) mi.addEventListener('change',function(){ const val=this.value.trim(); salaryConfig.manualOvertimePay=val===''?null:parseFloat(val); saveSalaryConfig(); renderSalaryResultOnly(); });
        document.getElementById('resetOvertimeBtn')?.addEventListener('click',()=>{ salaryConfig.manualOvertimePay=null; saveSalaryConfig(); renderSalaryResultOnly(); });
    }

    function switchTab(tab){
        if(activeTab===tab) return;
        if(editingRow!==null) finishEditing(editingRow);
        activeTab=tab;
        document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
        document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i=>i.classList.toggle('active',i.dataset.tab===tab));
        if(tab==='records') renderRecords();
        if(tab==='salary') renderSalaryPage();
    }
    function changeMonth(delta){
        let nm=month+delta, ny=year;
        if(nm<1){ nm=12; ny--; } if(nm>12){ nm=1; ny++; } if(ny<2020||ny>2099) return;
        if(editingRow!==null) finishEditing(editingRow);
        year=ny; month=nm; loadData(); renderAll();
    }
    function openShiftPicker(rowIdx){ pendingRow=rowIdx; modalEl.classList.add('show'); }
    function closeShiftPicker(){ modalEl.classList.remove('show'); }
    function applyShift(shift){
        if(pendingRow!==null){
            const def=(shift==='work'||shift==='night')?{normal:DEF_NORMAL,overtime:DEF_OVERTIME}:{normal:0,overtime:0};
            data[pendingRow].shift=shift; data[pendingRow].normal=def.normal; data[pendingRow].overtime=def.overtime;
            saveData(); renderSchedule(); renderRecords(); if(activeTab==='salary') renderSalaryResultOnly();
        }
        closeShiftPicker();
    }
    function renderAll(){ renderSchedule(); renderRecords(); if(activeTab==='salary') renderSalaryPage(); }

    document.querySelectorAll('#shiftModal .shift-option').forEach(b=>b.addEventListener('click',()=>applyShift(b.dataset.shift)));
    document.querySelectorAll('.nav-item').forEach(i=>i.addEventListener('click',()=>switchTab(i.dataset.tab)));
    document.getElementById('prevMonthBtn').addEventListener('click',()=>changeMonth(-1));
    document.getElementById('nextMonthBtn').addEventListener('click',()=>changeMonth(1));
    modalEl.addEventListener('click',e=>{ if(e.target===modalEl) closeShiftPicker(); });

    const now=new Date(); year=now.getFullYear(); month=now.getMonth()+1;
    loadData(); loadSalaryConfig(); loadFullHours(); renderAll(); switchTab('schedule');
    window.app={ openShift: openShiftPicker };
})();
</script>
</body>
</html>
